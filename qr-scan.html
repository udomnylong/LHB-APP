<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LHB — Check In/Out</title>
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ci:#0d9e6e;--co:#e07b00;--acc:#0d9e6e;
  --bg:#f0f4f8;--card:#fff;--text:#1a1e2e;--text2:#6b7280;--border:#e5e7eb;
  --font:'Kantumruy Pro',sans-serif;--r:14px;
}
body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* ── Header ── */
.hdr{width:100%;padding:14px 16px;background:var(--acc);display:flex;align-items:center;justify-content:space-between;color:#fff;flex-shrink:0;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;}
.hdr-title{font-size:15px;font-weight:700;}
.hdr-sub{font-size:11px;opacity:.8;margin-top:1px;}
.hdr-badge{padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.2);font-size:12px;font-weight:700;}

/* ── Wrap ── */
.wrap{width:100%;max-width:440px;padding:16px;display:flex;flex-direction:column;gap:12px;}

/* ── Card ── */
.card{background:var(--card);border-radius:var(--r);box-shadow:0 2px 12px rgba(0,0,0,.07);border:1px solid var(--border);overflow:hidden;}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.card-title{font-size:13px;font-weight:700;color:var(--text);}
.card-body{padding:14px 16px;}

/* ── Staff Info ── */
.staff-info{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.staff-av{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--acc),color-mix(in srgb,var(--acc) 60%,#000));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.staff-av img{width:100%;height:100%;object-fit:cover;}
.staff-name{font-size:16px;font-weight:700;color:var(--text);}
.staff-row{display:flex;align-items:center;gap:6px;margin-top:3px;}
.staff-tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.tag-id{background:rgba(59,130,246,.1);color:#2563eb;}
.tag-gmail{background:rgba(234,67,53,.1);color:#ea4335;word-break:break-all;}
.tag-pos{background:rgba(107,114,128,.1);color:#4b5563;}

/* ── GPS ── */
.gps-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#f8fafc;border-radius:10px;}
.gdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.gdot.searching{background:#f59e0b;animation:pulse 1.2s infinite;}
.gdot.ok{background:#10b981;}
.gdot.warn{background:#f59e0b;}
.gdot.err{background:#ef4444;}
.gps-text{font-size:13px;font-weight:500;color:var(--text);}
.gps-acc{font-size:11px;color:var(--text2);margin-top:1px;}
.gps-ico{margin-left:auto;font-size:15px;color:var(--text2);}

/* ── Action Button ── */
.btn-act{width:100%;padding:16px;border:none;border-radius:var(--r);color:#fff;font-family:var(--font);font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:.2s;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.btn-act:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
.btn-act:not(:disabled):active{transform:scale(.97);}
.btn-ci{background:linear-gradient(135deg,#0d9e6e,#0a7a55);}
.btn-co{background:linear-gradient(135deg,#e07b00,#b86200);}

/* ── Message ── */
.msg{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;}
.msg.show{opacity:1;pointer-events:auto;}
.msg.ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
.msg.warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a;}

/* ── Error / Loading ── */
.err-screen{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center;}
.err-screen.show{display:flex;}
.loading-screen{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:100;}
.loading-screen.hide{display:none;}

/* ── Verify Section (Gmail/OTP, shown only if NOT from portal) ── */
.verify-section{display:none;}
.verify-section.show{display:block;}
.divider{display:flex;align-items:center;gap:8px;margin:8px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:11px;color:var(--text2);}
.btn-google{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;color:var(--text);}
.btn-google img{width:18px;height:18px;}
.btn-tg{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#229ED9,#1a7ab0);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.ph-wrap{position:relative;margin-bottom:8px;}
.ph-pre{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text2);font-weight:600;}
.ph-inp{width:100%;padding:11px 12px 11px 48px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;color:var(--text);}
.ph-inp:focus{outline:none;border-color:var(--acc);}
.otp-wrap{display:flex;gap:7px;justify-content:center;margin:10px 0;}
.otp-box{width:42px;height:50px;text-align:center;font-size:20px;font-weight:700;border:1.5px solid var(--border);border-radius:9px;font-family:var(--font);color:var(--text);-moz-appearance:textfield;}
.otp-box::-webkit-outer-spin-button,.otp-box::-webkit-inner-spin-button{-webkit-appearance:none;}
.otp-box:focus{outline:none;border-color:var(--acc);}
.otp-box.filled{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 8%,transparent);}
.otp-timer{text-align:center;font-size:11px;color:var(--text2);margin-top:3px;}
.btn-sec{background:none;border:none;font-family:var(--font);font-size:12px;color:var(--text2);cursor:pointer;text-decoration:underline;padding:2px 6px;}
.toggle-link{text-align:center;margin-top:6px;}
.toggle-link button{background:none;border:none;font-family:var(--font);font-size:12px;color:var(--text2);cursor:pointer;text-decoration:underline;}
.man-box{display:none;margin-top:8px;}
.man-inp{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;color:var(--text);}
.man-inp:focus{outline:none;border-color:var(--acc);}
.btn-man-verify{width:100%;padding:11px;border:none;border-radius:10px;background:linear-gradient(135deg,#4285f4,#1d4ed8);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;}

/* ── History ── */
.hist-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8fafc;border-radius:9px;border:1px solid var(--border);margin-bottom:7px;}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.hist-name{font-size:13px;font-weight:600;color:var(--text);}
.hist-sub{font-size:10px;color:var(--text2);margin-top:1px;}
.hist-time{margin-left:auto;font-size:12px;font-weight:700;color:var(--text2);}
.hist-badge{margin-left:3px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;}

.offline-bar{display:none;background:#f59e0b;color:#fff;text-align:center;padding:7px;font-size:12px;font-weight:700;width:100%;}
.offline-bar.show{display:block;}
.spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div class="offline-bar" id="ob">📵 គ្មានអ៊ីនធឺណិត</div>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <i class="fas fa-spinner fa-spin" style="font-size:32px;color:#0d9e6e"></i>
  <div style="font-size:14px;color:#6b7280">កំពុង Load...</div>
</div>

<!-- Error -->
<div class="err-screen wrap" id="errScreen">
  <div style="font-size:48px">❌</div>
  <div style="font-size:18px;font-weight:700">QR Code មិនត្រឹមត្រូវ</div>
  <div style="font-size:13px;color:#6b7280">សូម Scan QR Code ពី HR System ឡើងវិញ</div>
</div>

<!-- Header -->
<div class="hdr" id="mainHdr" style="display:none">
  <div class="hdr-left">
    <div class="hdr-icon" id="hdrIcon"><i class="fas fa-building"></i></div>
    <div>
      <div class="hdr-title" id="hdrTitle">LHB HR</div>
      <div class="hdr-sub" id="hdrSub">Check In/Out</div>
    </div>
  </div>
  <div class="hdr-badge" id="hdrBadge">—</div>
</div>

<!-- Main -->
<div class="wrap" id="mainWrap" style="display:none">

  <!-- Message -->
  <div class="msg" id="msgBox"><i class="fas fa-info-circle" id="msgIco"></i><span id="msgTxt"></span></div>

  <!-- Staff Card -->
  <div class="card" id="staffCard">
    <div class="staff-info">
      <div class="staff-av" id="staffAv">?</div>
      <div style="flex:1;min-width:0">
        <div class="staff-name" id="staffName">—</div>
        <div class="staff-row">
          <span class="staff-tag tag-id" id="staffId">—</span>
        </div>
        <div style="margin-top:4px;font-size:11px;color:#6b7280" id="staffGmail">—</div>
        <div style="margin-top:3px;font-size:11px;color:#6b7280" id="staffPos">—</div>
      </div>
    </div>

    <!-- Verify section (only shown if not auto-verified from portal) -->
    <div id="verifySection" style="padding:0 16px 14px">
      <div class="verify-section show" id="verifyOptions">
        <!-- Gmail -->
        <div id="g_id_onload_area"></div>
        <button class="btn-google" onclick="startGoogleAuth()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
          Sign In ជាមួយ Gmail
        </button>

        <div class="divider"><span>ឬ</span></div>

        <!-- Telegram OTP -->
        <div id="otpPhoneArea">
          <div class="ph-wrap">
            <span class="ph-pre">+855</span>
            <input type="tel" class="ph-inp" id="otpPhone" placeholder="0XX-XX-XX-XX"
              oninput="formatOtpPhone(this)" onkeydown="if(event.key==='Enter')requestOTP()">
          </div>
          <button class="btn-tg" onclick="requestOTP()" id="btnSendOTP">
            <i class="fab fa-telegram"></i> ទទួល OTP Telegram
          </button>
        </div>

        <!-- OTP Boxes -->
        <div id="otpCodeArea" style="display:none">
          <div style="text-align:center;padding:8px 0;font-size:13px;font-weight:600;color:#1a1e2e" id="otpSentMsg">OTP ផ្ញើទៅ Telegram</div>
          <div class="otp-wrap">
            <input type="number" class="otp-box" oninput="otpInput(this,0)" onkeydown="otpKey(event,0)" maxlength="1">
            <input type="number" class="otp-box" oninput="otpInput(this,1)" onkeydown="otpKey(event,1)" maxlength="1">
            <input type="number" class="otp-box" oninput="otpInput(this,2)" onkeydown="otpKey(event,2)" maxlength="1">
            <input type="number" class="otp-box" oninput="otpInput(this,3)" onkeydown="otpKey(event,3)" maxlength="1">
            <input type="number" class="otp-box" oninput="otpInput(this,4)" onkeydown="otpKey(event,4)" maxlength="1">
            <input type="number" class="otp-box" oninput="otpInput(this,5)" onkeydown="otpKey(event,5)" maxlength="1">
          </div>
          <div class="otp-timer" id="otpCountdown">⏳ 5:00</div>
          <div style="text-align:center;margin-top:6px;display:flex;gap:10px;justify-content:center">
            <button class="btn-sec" onclick="backToPhone()">← Phone ម្ដងទៀត</button>
            <button class="btn-sec" id="btnResend" style="display:none;color:#229ED9" onclick="requestOTP()">🔄 ផ្ញើម្ដងទៀត</button>
          </div>
        </div>

        <div class="toggle-link"><button onclick="toggleManual()">⌨️ Gmail ដោយដៃ</button></div>
        <div class="man-box" id="manBox">
          <input type="email" class="man-inp" id="gmailManual" placeholder="yourname@gmail.com"
            onkeydown="if(event.key==='Enter')doManualVerify()">
          <button class="btn-man-verify" onclick="doManualVerify()">
            <i class="fas fa-check"></i> បញ្ជាក់ Gmail
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- GPS Card -->
  <div class="card" id="gpsCard" style="display:none">
    <div class="card-hdr">
      <div class="card-ico" style="background:rgba(16,185,129,.12);color:#0d9e6e"><i class="fas fa-location-crosshairs"></i></div>
      <div class="card-title">ទីតាំង GPS</div>
    </div>
    <div class="card-body">
      <div class="gps-row">
        <div class="gdot searching" id="gdot"></div>
        <div>
          <div class="gps-text" id="gpsText">កំពុងរក GPS...</div>
          <div class="gps-acc" id="gpsAcc"></div>
        </div>
        <i class="fas fa-satellite-dish gps-ico" id="gpsIco"></i>
      </div>
    </div>
  </div>

  <!-- Action Button -->
  <button class="btn-act btn-ci" id="actBtn" style="display:none" disabled onclick="doSubmit()">
    <i class="fas fa-spinner spin" id="actIco"></i>
    <span id="actTxt">Check In</span>
  </button>

  <!-- History -->
  <div class="card" id="histCard" style="display:none">
    <div class="card-hdr">
      <div class="card-ico" style="background:rgba(99,102,241,.12);color:#6366f1"><i class="fas fa-clock-rotate-left"></i></div>
      <div class="card-title">ប្រវត្តិថ្ងៃនេះ</div>
    </div>
    <div class="card-body" id="histList" style="padding:10px 14px"></div>
  </div>

</div><!-- end wrap -->

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ════════════════ CONFIG ════════════════
const SU = 'https://script.google.com/macros/s/AKfycbwReBXqhqr1hXNbmtN7GjxeEBFW--RzgdatCiUQ2PVwbxV5F-20BMQ9cWAIB5W_Nkd2/exec';
const GOOGLE_CLIENT_ID = '424197666452-6g7a7sdvkqhpkab5b0gbl8o4ml6v7bq0.apps.googleusercontent.com';
const DEPT_TIME_ROLES = [
  {depts:['Site Construction','Production','Stock'],checkIn:'07:00',checkOut:'17:00'},
  {depts:['Security','Cleaner & Cook','Cook','Cleaner'],checkIn:'06:00',checkOut:'18:00'},
];
const DEFAULT_ROLE = {checkIn:'08:00',checkOut:'17:00'};

let QD=null, staff=[], matched=null, user=null, gps=null, busy=false;
let _otpPhone='', _otpTimer=null;

// ════════════════ INIT ════════════════
document.addEventListener('DOMContentLoaded', () => {
  parseQR();
  window.addEventListener('offline', ()=>document.getElementById('ob').classList.add('show'));
  window.addEventListener('online',  ()=>document.getElementById('ob').classList.remove('show'));
  if(!navigator.onLine) document.getElementById('ob').classList.add('show');

  // Auto-verify from Staff Portal session
  const _sv = sessionStorage.getItem('portal_staff') || sessionStorage.getItem('hr_gu');
  if (_sv) {
    try {
      const _su = JSON.parse(_sv);
      const _id = _su._staffId || _su.ID || '';
      const _em = _su.email || _su.Gmail || '';
      if (_id || _em) {
        user = {email:_em, name:_su.name||_su.Name||'', picture:null};
        function _tryAV() {
          if (!staff || !staff.length) return false;
          const f = staff.find(s =>
            (_id && String(s.ID||'').trim()===String(_id).trim()) ||
            (_em  && (s.Gmail||'').toLowerCase().trim()===_em.toLowerCase().trim())
          );
          if (f) { matched=f; showStaff(f); hideMsg(); afterVerified(); return true; }
          return false;
        }
        if (!_tryAV()) {
          let _t=0; const _w=setInterval(()=>{ _t++; if(_tryAV()||_t>20) clearInterval(_w); },400);
        }
      }
    } catch(e) {}
  }
});

function parseQR() {
  const raw = new URLSearchParams(window.location.search).get('d');
  if (!raw) { showErr(); return; }
  try {
    QD = JSON.parse(decodeURIComponent(raw));
    if (!QD.project||!QD.type) throw 0;
    initUI();
  } catch(e) { showErr(); }
}

function showErr() {
  document.getElementById('loadingScreen').classList.add('hide');
  document.getElementById('errScreen').classList.add('show');
}

function initUI() {
  const ci = QD.type === 'checkin';
  const acc = ci ? '#0d9e6e' : '#e07b00';
  document.documentElement.style.setProperty('--acc', acc);

  document.getElementById('mainHdr').style.display  = '';
  document.getElementById('mainWrap').style.display  = '';
  document.getElementById('loadingScreen').classList.add('hide');

  document.getElementById('hdrTitle').textContent = QD.project || 'LHB HR';
  document.getElementById('hdrSub').textContent   = ci ? 'Check In System' : 'Check Out System';
  document.getElementById('hdrBadge').textContent  = ci ? '🟢 Check In' : '🟡 Check Out';
  document.getElementById('hdrIcon').style.background = 'rgba(255,255,255,.2)';

  const ab = document.getElementById('actBtn');
  ab.className = 'btn-act ' + (ci ? 'btn-ci' : 'btn-co');
  document.getElementById('actTxt').textContent = ci ? 'Check In' : 'Check Out';

  loadHistory();
  loadStaffFromSheet();
  initGoogleAuth();
}

// ════════════════ SHOW STAFF ════════════════
function showStaff(s) {
  document.getElementById('staffName').textContent  = s.Name   || '—';
  document.getElementById('staffId').textContent    = s.ID     || '—';
  document.getElementById('staffGmail').textContent = s.Gmail  ? '✉️ ' + s.Gmail  : '';
  document.getElementById('staffPos').textContent   = [s.Position, s.Department].filter(Boolean).join(' · ') || '';

  // Photo or initials
  const av = document.getElementById('staffAv');
  if (s.Photo && s.Photo.startsWith('http')) {
    const m1x = s.Photo.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    const m2x = s.Photo.match(/thumbnail\?id=([a-zA-Z0-9_-]+)/);
    const m3x = s.Photo.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    const fid = (m1x&&m1x[1])||(m2x&&m2x[1])||(m3x&&m3x[1])||'';
    const src = fid ? 'https://lh3.googleusercontent.com/d/'+fid : s.Photo;
    av.innerHTML = '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="this.parentNode.textContent=\'' + (s.Name||'?')[0] + '\'">';
  } else {
    av.textContent = (s.Name||'?')[0];
  }

  // Hide verify options — show confirmed state
  document.getElementById('verifyOptions').style.display = 'none';
  document.getElementById('verifySection').innerHTML = '<div style="padding:4px 16px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#0d9e6e;font-weight:600"><i class="fas fa-check-circle"></i> Verified ✅</div>';
}

function showAuthStatus(type, name, email, pic) {
  if (type==='success' && matched) showStaff(matched);
}

// ════════════════ GOOGLE AUTH ════════════════
function initGoogleAuth() {
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: onGoogleSignIn,
      auto_select: false,
    });
    google.accounts.id.prompt();
  }
}
function startGoogleAuth() {
  if (typeof google !== 'undefined' && google.accounts) google.accounts.id.prompt();
  else { showMsg('ប្រើ Gmail ដោយដៃ','warn'); document.getElementById('manBox').style.display='block'; }
}
function onGoogleSignIn(resp) {
  try {
    const pl = JSON.parse(atob(resp.credential.split('.')[1]));
    const em = pl.email.toLowerCase().trim();
    user = {email:em, name:pl.name||em.split('@')[0], picture:pl.picture||null};
    sessionStorage.setItem('hr_gu', JSON.stringify(user));
    showMsg('⏳ ពិនិត្យ Gmail...','warn');
    setTimeout(()=>verifyGmail(em), 500);
  } catch(e) { showMsg('❌ Google Error','err'); }
}
function toggleManual() { const b=document.getElementById('manBox'); b.style.display=b.style.display==='none'?'block':'none'; }
function doManualVerify() {
  const v=document.getElementById('gmailManual').value.trim().toLowerCase();
  if(!v||!v.includes('@')) { document.getElementById('gmailManual').style.borderColor='#ef4444'; return; }
  user={email:v,name:v.split('@')[0],picture:null};
  sessionStorage.setItem('hr_gu',JSON.stringify(user));
  showMsg('⏳ ពិនិត្យ...','warn');
  setTimeout(()=>verifyGmail(v),300);
}
function verifyGmail(email) {
  const em=email.toLowerCase().trim();
  if(!staff||!staff.length){showMsg('⏳ Loading...','warn');setTimeout(()=>verifyGmail(email),800);return;}
  const f=staff.find(s=>(s.Gmail||'').toLowerCase().trim()===em||(s.Email||'').toLowerCase().trim()===em);
  if(!f){showMsg('❌ Gmail មិន Register — ទាក់ទង HR Admin','err');return;}
  matched=f; showStaff(f); hideMsg(); afterVerified();
}

// ════════════════ TELEGRAM OTP ════════════════
function formatOtpPhone(inp) {
  let d=inp.value.replace(/[^0-9]/g,'').slice(0,10);
  if(d.length>7) inp.value=d.slice(0,3)+'-'+d.slice(3,5)+'-'+d.slice(5,7)+'-'+d.slice(7);
  else if(d.length>5) inp.value=d.slice(0,3)+'-'+d.slice(3,5)+'-'+d.slice(5);
  else if(d.length>3) inp.value=d.slice(0,3)+'-'+d.slice(3);
  else inp.value=d;
}
async function requestOTP() {
  const raw=document.getElementById('otpPhone').value.replace(/[^0-9]/g,'');
  if(raw.length<8){document.getElementById('otpPhone').style.borderColor='#ef4444';return;}
  _otpPhone=raw;
  const btn=document.getElementById('btnSendOTP');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner spin"></i> ផ្ញើ...';
  try {
    const r=await fetch(SU,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'sendOTP',phone:raw})});
    const j=await r.json();
    if(j.status==='ok'){
      document.getElementById('otpPhoneArea').style.display='none';
      document.getElementById('otpCodeArea').style.display='block';
      document.getElementById('otpSentMsg').textContent='OTP ផ្ញើទៅ: 0'+raw;
      document.querySelectorAll('.otp-box')[0].focus();
      startOtpTimer(300);
    } else { showMsg('⚠️ '+(j.msg||'Phone មិននៅក្នុង System'),'err'); }
  } catch(e){showMsg('❌ '+e.message,'err');}
  btn.disabled=false; btn.innerHTML='<i class="fab fa-telegram"></i> ទទួល OTP Telegram';
}
function otpInput(inp,idx) {
  inp.value=inp.value.replace(/[^0-9]/g,'').slice(-1);
  if(inp.value){inp.classList.add('filled');if(idx<5)document.querySelectorAll('.otp-box')[idx+1].focus();}
  else inp.classList.remove('filled');
  if([...document.querySelectorAll('.otp-box')].map(b=>b.value).join('').length===6) verifyOTP();
}
function otpKey(evt,idx){if(evt.key==='Backspace'&&!evt.target.value&&idx>0){const p=document.querySelectorAll('.otp-box')[idx-1];p.value='';p.classList.remove('filled');p.focus();}}
async function verifyOTP() {
  const code=[...document.querySelectorAll('.otp-box')].map(b=>b.value).join('');
  if(code.length<6)return;
  showMsg('⏳ ពិនិត្យ OTP...','warn');
  try {
    const r=await fetch(SU,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'verifyOTP',phone:_otpPhone,code})});
    const j=await r.json();
    if(j.status==='ok'&&j.staff){
      clearInterval(_otpTimer);
      matched=j.staff;
      user={email:j.staff.Gmail||('0'+_otpPhone),name:j.staff.Name,picture:null};
      sessionStorage.setItem('hr_gu',JSON.stringify(user));
      showStaff(j.staff); hideMsg(); afterVerified();
    } else {
      showMsg('❌ OTP '+(j.msg||'មិនត្រឹមត្រូវ'),'err');
      [...document.querySelectorAll('.otp-box')].forEach(b=>{b.value='';b.classList.remove('filled');b.style.borderColor='#ef4444';});
      document.querySelectorAll('.otp-box')[0].focus();
    }
  } catch(e){showMsg('❌ '+e.message,'err');}
}
function startOtpTimer(sec){
  let s=sec; clearInterval(_otpTimer);
  const el=document.getElementById('otpCountdown'),rs=document.getElementById('btnResend');
  _otpTimer=setInterval(()=>{s--;const m=Math.floor(s/60),ss=s%60;if(el)el.textContent='⏳ '+m+':'+(ss<10?'0':'')+ss;if(s<=0){clearInterval(_otpTimer);if(el)el.textContent='❌ Expired';if(rs)rs.style.display='inline';}if(s===240&&rs)rs.style.display='inline';},1000);
}
function backToPhone(){
  clearInterval(_otpTimer);
  document.getElementById('otpPhoneArea').style.display='block';
  document.getElementById('otpCodeArea').style.display='none';
  [...document.querySelectorAll('.otp-box')].forEach(b=>{b.value='';b.classList.remove('filled');b.style.borderColor='';});
}

// ════════════════ AFTER VERIFY → GPS ════════════════
function afterVerified() {
  document.getElementById('gpsCard').style.display = '';
  const ab = document.getElementById('actBtn');
  ab.style.display = '';
  startGPS();
}

// ════════════════ GPS ════════════════
function startGPS() {
  if(!navigator.geolocation){setGPS('err','Browser មិន Support GPS');enableBtn(false);return;}
  setGPS('searching','កំពុងរក GPS...');
  navigator.geolocation.watchPosition(onGPS,onGPSErr,{enableHighAccuracy:true,timeout:15000,maximumAge:3000});
}
function onGPS(pos){
  const {latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
  gps={lat,lng,acc};
  document.getElementById('gpsAcc').textContent='±'+Math.round(acc)+'m';
  if(QD&&QD.lat&&parseFloat(QD.lat)!==0){
    const d=calcDist(lat,lng,+QD.lat,+(QD.lng||0)),r=+(QD.radius||100);
    if(d<=r){setGPS('ok','✅ ក្នុងតំបន់ ('+Math.round(d)+'m)');enableBtn(true);}
    else{setGPS('err','🚫 ក្រៅតំបន់ '+Math.round(d)+'m (Max:'+r+'m)');enableBtn(false);}
  }else{
    if(acc<=300){setGPS('ok','✅ GPS OK (±'+Math.round(acc)+'m)');enableBtn(true);}
    else{setGPS('warn','⏳ GPS មិនច្បាស់ (±'+Math.round(acc)+'m)');enableBtn(false);}
  }
}
function onGPSErr(e){
  const msg=e.code===1?'🚫 Allow Location ក្នុង Browser':e.code===2?'📡 GPS ចាប់មិនបាន':'⏱️ GPS Timeout';
  setGPS('err',msg); gps=null; enableBtn(false);
}
function setGPS(t,msg){
  document.getElementById('gdot').className='gdot '+t;
  document.getElementById('gpsText').textContent=msg;
  if(t==='ok') document.getElementById('gpsIco').style.color='var(--acc)';
}
function enableBtn(ok){
  const btn=document.getElementById('actBtn');
  btn.disabled=!ok;
  const ci=QD&&QD.type==='checkin';
  if(ok) btn.innerHTML='<i class="fas fa-'+(ci?'right-to-bracket':'right-from-bracket')+'"></i><span>'+(ci?'Check In':'Check Out')+'</span>';
}

// ════════════════ SUBMIT ════════════════
async function doSubmit(){
  if(busy||!matched)return;
  if(!gps){showMsg('🚫 GPS ចាប់មិនបាន — រង់ចាំ GPS Lock','err');return;}
  if(QD&&QD.lat&&parseFloat(QD.lat)!==0){
    const d=calcDist(gps.lat,gps.lng,+QD.lat,+(QD.lng||0));
    if(d>+(QD.radius||100)){showMsg('🚫 ក្រៅតំបន់! '+Math.round(d)+'m','err');return;}
  }
  busy=true;
  const btn=document.getElementById('actBtn');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner spin"></i> កំពុង Sync...';

  const n=new Date(),time=pad(n.getHours())+':'+pad(n.getMinutes());
  const date=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());
  const dept=matched.Department||matched.Position||'';
  const li=calcLate(time,QD.type,dept);
  const sn=QD.type==='checkin'?'CheckIn':'CheckOut';
  const row={
    ID:matched.ID||'',Name:matched.Name||'',Gmail:user?user.email:'',
    ProjectName:QD.project||'',Date:date,Time:time,Timestamp:n.toISOString(),
    Latitude:gps.lat,Longitude:gps.lng,Accuracy:gps.acc,
    LateEarly:li.label,Minutes:li.min,
    Position:matched.Position||'',Department:dept,
  };
  try {
    await fetch(SU,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'append',sheet:sn,data:row})});
    fetch(SU,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'upsert',sheet:'Attendance',data:{ID:row.ID,Name:row.Name,Position:row.Position,Department:dept,ProjectName:row.ProjectName,Date:date,CheckIn:QD.type==='checkin'?time:'',CheckOut:QD.type==='checkout'?time:'',Late:QD.type==='checkin'?li.label:'',Status:'Present'},keyValue:row.ID,keyDate:date})}).catch(()=>{});
    const ci=QD.type==='checkin';
    const hKey='hr_h_'+date;
    const hist=JSON.parse(localStorage.getItem(hKey)||'[]');
    hist.unshift({email:row.Gmail,name:row.Name,type:QD.type,time,id:row.ID});
    localStorage.setItem(hKey,JSON.stringify(hist.slice(0,20)));
    btn.innerHTML='<i class="fas fa-check"></i> '+(ci?'Check In':'Check Out')+' ✅';
    showMsg('✅ '+(ci?'Check In':'Check Out')+' ជោគជ័យ! — '+row.Name+' ('+time+')','ok');
    loadHistory();
  } catch(e){
    showMsg('❌ '+e.message,'err');
    btn.disabled=false;
    const ci=QD&&QD.type==='checkin';
    btn.innerHTML='<i class="fas fa-'+(ci?'right-to-bracket':'right-from-bracket')+'"></i><span>'+(ci?'Check In':'Check Out')+'</span>';
  }
  busy=false;
}

// ════════════════ HISTORY ════════════════
function loadHistory(){
  const n=new Date(),key='hr_h_'+n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());
  const hist=JSON.parse(localStorage.getItem(key)||'[]');
  const card=document.getElementById('histCard'),list=document.getElementById('histList');
  if(!hist.length){card.style.display='none';return;}
  card.style.display='';
  list.innerHTML=hist.slice(0,5).map(h=>{
    const ci=h.type==='checkin',col=ci?'#0d9e6e':'#e07b00';
    return '<div class="hist-item"><div class="hist-dot" style="background:'+col+'"></div><div><div class="hist-name">'+h.name+'</div><div class="hist-sub">'+(ci?'Check In':'Check Out')+'</div></div><div class="hist-time">'+h.time+'<span class="hist-badge" style="background:'+col+'22;color:'+col+'">'+(ci?'In':'Out')+'</span></div></div>';
  }).join('');
}

// ════════════════ LOAD STAFF ════════════════
async function loadStaffFromSheet(){
  try{
    const saved=localStorage.getItem('hr_sc');
    if(saved){try{staff=JSON.parse(saved);}catch(e){}}
    const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),10000);
    const r=await fetch(SU+'?sheet=StaffInfo&t='+Date.now(),{redirect:'follow',signal:ctrl.signal});
    const txt=await r.text();
    const j=JSON.parse(txt.startsWith('{')?txt:txt.replace(/^[^{]*/,''));
    if(j.status==='ok'&&j.data&&j.data.length){staff=j.data;localStorage.setItem('hr_sc',JSON.stringify(staff));}
  }catch(e){}
}

// ════════════════ UTILS ════════════════
function calcDist(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function getDeptRole(dept){const d=(dept||'').toLowerCase();for(const r of DEPT_TIME_ROLES){if(r.depts.some(rd=>d.includes(rd.toLowerCase())))return r;}return DEFAULT_ROLE;}
function calcLate(t,type,dept){
  const role=getDeptRole(dept),[h,m]=t.split(':').map(Number),tot=h*60+m;
  if(type==='checkin'){const[sh,sm]=role.checkIn.split(':').map(Number),sc=sh*60+sm,diff=tot-sc;if(diff>0)return{label:'Late +'+diff+'min',min:diff};if(diff<0)return{label:'Early '+-diff+'min',min:diff};return{label:'OnTime',min:0};}
  const[eh,em]=role.checkOut.split(':').map(Number),sc=eh*60+em,diff=tot-sc;
  if(diff<0)return{label:'Early -'+-diff+'min',min:diff};if(diff>0)return{label:'OT +'+diff+'min',min:diff};return{label:'OnTime',min:0};
}
function pad(n){return String(n).padStart(2,'0');}
function showMsg(txt,type){const el=document.getElementById('msgBox'),ic=document.getElementById('msgIco');document.getElementById('msgTxt').textContent=txt;ic.className='fas '+(type==='ok'?'fa-check-circle':type==='err'?'fa-exclamation-circle':'fa-triangle-exclamation');el.className='msg show '+(type||'');}
function hideMsg(){document.getElementById('msgBox').className='msg';}

// ════════════════ PWA ════════════════
if(location.protocol==='https:'&&'serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
