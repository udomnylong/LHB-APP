<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LHB HR">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#e07b00">
  <!-- iOS Icons (inline SVG as base64) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23e07b00'/><text x='90' y='125' font-size='100' text-anchor='middle'>🏢</text></svg>">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🍽️ Food Scan — LHB HR</title>
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--p:#1a3c5e;--g:#10b981;--y:#f59e0b;--r:#ef4444;--bg:#f0f4f8;--card:#fff;--txt:#1e293b;--txt2:#64748b;--bd:#e2e8f0;--fn:'Kantumruy Pro',sans-serif;}
body{font-family:var(--fn);background:var(--bg);min-height:100vh;}
.hdr{background:linear-gradient(135deg,#1a3c5e,#2a5298);padding:16px 20px;text-align:center;color:#fff;}
.hdr h1{font-size:20px;font-weight:700;}
.hdr p{font-size:12px;opacity:.75;margin-top:3px;}
.wrap{max-width:460px;margin:0 auto;padding:14px;}
.card{background:var(--card);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sn{width:28px;height:28px;border-radius:50%;background:var(--p);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.st{font-size:15px;font-weight:700;color:var(--p);}
.sw{position:relative;}
.sw::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--txt2);pointer-events:none;}
select,input[type=text],textarea{width:100%;padding:11px 14px;border:2px solid var(--bd);border-radius:10px;font-family:var(--fn);font-size:14px;background:#fff;color:var(--txt);}
select{-webkit-appearance:none;}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--p);}
textarea{resize:none;line-height:1.5;}
.staff-prev{display:flex;align-items:center;gap:12px;padding:11px;background:#f8faff;border-radius:10px;border:1px solid var(--bd);margin-top:10px;}
.av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1a3c5e,#2563a8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:17px;flex-shrink:0;}
/* Meal */
.mb{display:flex;align-items:center;gap:12px;padding:13px 14px;border:2px solid var(--bd);border-radius:11px;cursor:pointer;background:#fff;user-select:none;transition:.15s;}
.mb.on{border-color:var(--g);background:#f0fdf4;}
.mb .ck{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;color:#fff;}
.mb.on .ck{background:var(--g);border-color:var(--g);}
/* Photo */
.pa{display:none;margin:8px 0 10px 48px;}
.pa.show{display:block;}
.pb{position:relative;border:2px dashed var(--bd);border-radius:10px;overflow:hidden;background:#f8faff;cursor:pointer;min-height:76px;}
.pb:hover{border-color:var(--p);}
.pb input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;}
.pph{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;gap:5px;color:var(--txt2);}
.pph i{font-size:20px;}
.pph span{font-size:11px;}
.ppv{width:100%;max-height:150px;object-fit:cover;display:none;}
.pst{font-size:11px;padding:4px 10px;text-align:center;min-height:20px;}
.prm{position:absolute;top:5px;right:5px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;z-index:3;font-weight:700;}
/* Submit */
.bsub{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-family:var(--fn);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(16,185,129,.3);}
.bsub:disabled{background:#94a3b8;box-shadow:none;cursor:not-allowed;}
/* Result */
.res{border-radius:14px;padding:22px;text-align:center;display:none;margin-bottom:12px;}
.res.ok{background:#f0fdf4;border:2px solid #bbf7d0;}
.res.err{background:#fef2f2;border:2px solid #fecaca;}
/* Loading/Toast */
.ld{position:fixed;inset:0;background:rgba(255,255,255,.88);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:10px;}
.sp{width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:var(--p);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:40px;font-size:12px;font-weight:600;display:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.db{text-align:center;padding:8px;background:#eff6ff;border-radius:8px;font-size:12px;color:#2563a8;font-weight:600;margin-bottom:12px;}
</style>
</head>
<body>
<div class="ld" id="ldEl"><div class="sp"></div><span style="font-size:12px;color:var(--txt2);">Loading...</span></div>
<div class="toast" id="toastEl"></div>

<div class="hdr">
  <h1>🍽️ ស្ខែនម្ហូប</h1>
  <p id="hdrP">LHB HR System</p>
</div>

<div class="wrap">
  <!-- Result -->
  <div class="res" id="resEl">
    <div style="font-size:48px;margin-bottom:10px;" id="resIco"></div>
    <div style="font-size:17px;font-weight:700;margin-bottom:6px;" id="resTit"></div>
    <div style="font-size:13px;color:var(--txt2);" id="resSub"></div>
    <div id="resPics" style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;"></div>
    <button onclick="resetForm()" style="margin-top:14px;padding:9px 22px;border-radius:8px;border:2px solid var(--p);background:#fff;color:var(--p);font-family:var(--fn);font-size:13px;font-weight:600;cursor:pointer;">ស្ខែនម្ដងទៀត</button>
  </div>

  <!-- Step 1: Search Name/ID -->
  <div class="card" id="s1">
    <div class="sh"><div class="sn">1</div><div class="st">ស្វែងរកឈ្មោះ / ID</div></div>
    <div style="position:relative;">
      <input type="text" id="searchInput" placeholder="វាយឈ្មោះ ឬ ID (ឧ. L-00013, ណារ...)"
        oninput="onSearch(this.value)"
        style="width:100%;padding:12px 14px 12px 42px;border:2px solid var(--bd);border-radius:10px;
          font-family:var(--fn);font-size:14px;background:#fff;color:var(--txt);">
      <i class="fas fa-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt2);"></i>
    </div>
    <!-- Search Results Dropdown -->
    <div id="searchResults" style="display:none;margin-top:8px;border:1.5px solid var(--bd);
      border-radius:10px;overflow:hidden;max-height:220px;overflow-y:auto;background:#fff;
      box-shadow:0 4px 16px rgba(0,0,0,.1);">
    </div>
    <!-- Selected Staff Preview -->
    <div id="sPv" style="display:none;margin-top:10px;">
      <div class="staff-prev" style="background:#f0fdf4;border-color:#bbf7d0;">
        <div class="av" id="sAv" style="background:linear-gradient(135deg,#059669,#10b981);">?</div>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:15px;" id="sNm">-</div>
          <div style="font-size:12px;color:var(--txt2);" id="sSb">-</div>
        </div>
        <button onclick="clearSearch()" style="padding:4px 10px;border:1px solid #94a3b8;
          border-radius:6px;background:#fff;color:var(--txt2);font-size:11px;cursor:pointer;">✕</button>
      </div>
    </div>
  </div>

  <!-- Step 2: Select Project (auto-filled from staff) -->
  <div class="card" id="s2" style="display:none;">
    <div class="sh"><div class="sn">2</div><div class="st">គម្រោង</div></div>
    <div class="sw"><select id="selProj" onchange="onProj()">
      <option value="">-- ជ្រើសរើសគម្រោង --</option>
    </select></div>
  </div>

  <!-- Step 3 -->
  <div class="card" id="s3" style="display:none;">
    <div class="sh"><div class="sn">3</div><div class="st">ជ្រើសពេលម្ហូប + រូបថត</div></div>
    <div class="db" id="dbDt">📅 ...</div>

    <!-- Morning -->
    <div style="margin-bottom:10px;">
      <div class="mb" id="bm" onclick="togMeal('m')">
        <span style="font-size:22px;">🌅</span>
        <span style="font-weight:600;font-size:14px;">ព្រឹក (Morning)</span>
        <div class="ck" id="ckm"><i class="fas fa-check" style="font-size:11px;"></i></div>
      </div>
      <div class="pa" id="pam">
        <div class="pb" id="pbm">
          <div class="pph" id="phm"><i class="fas fa-camera"></i><span>ថតរូបម្ហូបព្រឹក</span></div>
          <img class="ppv" id="imgm"><div class="pst" id="stm"></div>
          <button class="prm" id="rmm" onclick="remPhoto('m',event)">✕</button>
          <input type="file" accept="image/*" capture="environment" onchange="onPhoto('m',this)">
        </div>
      </div>
    </div>

    <!-- Lunch -->
    <div style="margin-bottom:10px;">
      <div class="mb" id="bl" onclick="togMeal('l')">
        <span style="font-size:22px;">☀️</span>
        <span style="font-weight:600;font-size:14px;">ថ្ងៃត្រង់ (Lunch)</span>
        <div class="ck" id="ckl"><i class="fas fa-check" style="font-size:11px;"></i></div>
      </div>
      <div class="pa" id="pal">
        <div class="pb" id="pbl">
          <div class="pph" id="phl"><i class="fas fa-camera"></i><span>ថតរូបម្ហូបថ្ងៃ</span></div>
          <img class="ppv" id="imgl"><div class="pst" id="stl"></div>
          <button class="prm" id="rml" onclick="remPhoto('l',event)">✕</button>
          <input type="file" accept="image/*" capture="environment" onchange="onPhoto('l',this)">
        </div>
      </div>
    </div>

    <!-- Evening -->
    <div style="margin-bottom:10px;">
      <div class="mb" id="be" onclick="togMeal('e')">
        <span style="font-size:22px;">🌙</span>
        <span style="font-weight:600;font-size:14px;">ល្ងាច (Evening)</span>
        <div class="ck" id="cke"><i class="fas fa-check" style="font-size:11px;"></i></div>
      </div>
      <div class="pa" id="pae">
        <div class="pb" id="pbe">
          <div class="pph" id="phe"><i class="fas fa-camera"></i><span>ថតរូបម្ហូបល្ងាច</span></div>
          <img class="ppv" id="imge"><div class="pst" id="ste"></div>
          <button class="prm" id="rme" onclick="remPhoto('e',event)">✕</button>
          <input type="file" accept="image/*" capture="environment" onchange="onPhoto('e',this)">
        </div>
      </div>
    </div>

    <!-- Comment -->
    <div style="margin-top:4px;">
      <label style="font-size:13px;font-weight:600;color:var(--txt2);display:block;margin-bottom:6px;">💬 មតិយោបល់ (Comment)</label>
      <textarea id="txtComment" rows="2" placeholder="បញ្ចូលមតិយោបល់ (ស្រេចចិត្ត)..." style="font-size:13px;"></textarea>
    </div>
  </div>

  <!-- Submit -->
  <div id="s4" style="display:none;">
    <button class="bsub" id="btnSub" onclick="submitFood()">
      <i class="fas fa-paper-plane"></i><span>បញ្ជូនទិន្នន័យ</span>
    </button>
    <p style="text-align:center;font-size:11px;color:var(--txt2);margin-top:8px;">
      📊 Sync → Google Sheet "Food" | 📸 Photo → Google Drive
    </p>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
var SU = 'https://script.google.com/macros/s/AKfycbyJet2vV4KlaEmfwymWFWFL4SyTVfK7RxTIhwhqmez9Wi9oI5HATCdvy0OZ9J-8czo/exec';
var SHEET_ID  = '16ryjqdieYbZAaG9phRMVInz_Yt6bP8KtWmEYXBcZRH0';
var FOLDER_ID = '1Ue7-K0QPDVwQcRszw5xF7b3SH25yGj5y';
var UNIT      = 2.5;

// ============================================================
// STATE
// ============================================================
var allStaff  = [];
var curProj   = '';
var curStaff  = null;
var meals     = {m:false,l:false,e:false};
var photoB64  = {m:'',l:'',e:''};  // compressed base64 (local display)
var photoURL  = {m:'',l:'',e:''};  // Drive URL (after upload)

// ============================================================
// INIT
// ============================================================
function autoFillStaffFromPortal() {
  try {
    var saved = sessionStorage.getItem('portal_staff') || sessionStorage.getItem('food_staff');
    if (!saved || !allStaff || !allStaff.length) return;
    var ps = JSON.parse(saved);
    var staffId    = ps.ID    || ps._staffId || '';
    var staffGmail = ps.Gmail || ps.email    || '';
    var found = null;
    if (staffId)    found = allStaff.filter(function(s){ return String(s.ID||'').trim()===String(staffId).trim(); })[0];
    if (!found && staffGmail) found = allStaff.filter(function(s){ return (s.Gmail||'').toLowerCase().trim()===staffGmail.toLowerCase().trim(); })[0];
    if (found) {
      selectStaff(found.ID);
      document.getElementById('searchInput').value = cn(found.Name);
      document.getElementById('searchResults').style.display = 'none';
      toast('✅ Auto: ' + cn(found.Name));
      console.log('Auto-filled staff:', found.Name);
    }
  } catch(e) { console.warn('autoFillStaff:', e); }
}

window.onload = function() {
  var now = new Date();
  var d   = now.toISOString().split('T')[0];
  var t   = p2(now.getHours())+':'+p2(now.getMinutes());
  document.getElementById('hdrP').textContent  = d+' ⏰ '+t;
  document.getElementById('dbDt').textContent  = '📅 '+d;
  var h = now.getHours();
  if(h>=5&&h<10)       togMeal('m');
  else if(h>=10&&h<15) togMeal('l');
  else if(h>=15&&h<21) togMeal('e');
  loadStaff();
  // After 12s, show retry if still no data
  setTimeout(function(){
    if(!allStaff||allStaff.length===0){
      var box=document.getElementById('s1');
      if(box&&!document.getElementById('retryLoad')){
        var btn=document.createElement('button');
        btn.id='retryLoad';
        btn.innerHTML='🔄 Load ម្ដងទៀត';
        btn.style.cssText='width:100%;margin-top:10px;padding:11px;background:var(--p);color:#fff;border:none;border-radius:10px;font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer;';
        btn.onclick=function(){this.remove();loadStaff();};
        box.appendChild(btn);
        toast('⚠️ Load យូរ — ចុច Retry',4000);
      }
    }
  },12000);
};

// ============================================================
// LOAD STAFF (JSONP — no CORS needed)
// ============================================================
function loadStaff() {
  showLd(true); toast('⏳ Loading...');
  var cb  = 'fscb'+Date.now();
  var url = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+
            '/gviz/tq?tqx=out:json&sheet=StaffInfo&callback='+cb;
  var tid = setTimeout(function(){
    delete window[cb];
    // Fallback: try Apps Script
    loadViaAppsScript();
  },8000);

  window[cb] = function(data){
    clearTimeout(tid); delete window[cb];
    try{
      // gviz columns: use label first, then id, then column letter
      var cols=data.table.cols.map(function(c,i){
        return (c.label&&c.label.trim())?c.label.trim():((c.id&&c.id.trim())?c.id.trim():'col'+i);
      });
      console.log('[JSONP] cols:', cols.join(','));
      allStaff=data.table.rows.map(function(row){
        var o={};
        cols.forEach(function(c,i){o[c]=(row.c&&row.c[i]&&row.c[i].v!=null)?String(row.c[i].v):'';});
        return o;
      }).filter(function(s){return s.ID||s.Name;});
      buildProjs();
    autoFillStaffFromPortal();
      console.log('[JSONP] allStaff[0]:', JSON.stringify(allStaff[0]));
      toast('✅ Load '+allStaff.length+' នាក់');
    }catch(e){loadViaAppsScript();}
    showLd(false);
  };
  var sc=document.createElement('script');
  sc.src=url;
  sc.onerror=function(){clearTimeout(tid);delete window[cb];loadViaAppsScript();};
  document.head.appendChild(sc);
}

function loadViaAppsScript(){
  if(allStaff&&allStaff.length>0){showLd(false);return;} // already loaded
  showLd(true);
  console.log('[M2] Trying Apps Script fetch...');
  fetch(SU+'?sheet=StaffInfo&t='+Date.now(),{mode:'cors',cache:'no-cache'})
  .then(function(r){return r.json();})
  .then(function(j){
    if(j.status==='ok'&&j.data&&j.data.length){
      allStaff=j.data; buildProjs(); toast('✅ Load '+allStaff.length+' នាក់');
    // Auto-select staff from Staff Portal session
    autoFillStaffFromPortal();
    } else { showErr('⚠️ Sheet ទទេ — Add Staff ជាមុន'); }
  })
  .catch(function(){showErr('❌ Network Error — Refresh');})
  .finally(function(){showLd(false);});
}

function buildProjs(){
  var p=[]; allStaff.forEach(function(s){if(s.ProjectName&&p.indexOf(s.ProjectName)<0)p.push(s.ProjectName);});
  p.sort();
  var sel=document.getElementById('selProj');
  sel.innerHTML='<option value="">-- ជ្រើសរើសគម្រោង --</option>'+
    p.map(function(x){return '<option value="'+x+'">'+x+'</option>';}).join('');
}

function showErr(msg){
  document.getElementById('selProj').innerHTML='<option value="">'+msg+'</option>';
  toast(msg,5000);
}

// ============================================================
// STEP HANDLERS — Search → Project
// ============================================================

// Step 1: Search by name or ID
function onSearch(val) {
  var q = val.trim().toLowerCase();
  var res = document.getElementById('searchResults');
  if (!q || q.length < 1) { res.style.display='none'; return; }

  if (!allStaff || allStaff.length === 0) {
    res.style.display='block';
    res.innerHTML='<div style="padding:12px 14px;color:#ef4444;font-size:13px;">⚠️ Data ទំនេរ — ចុច Refresh ➜ ឬ ពិនិត្យ Internet</div>';
    return;
  }

  var matches = allStaff.filter(function(s){
    var nm = cn(s.Name).toLowerCase();
    var id = (s.ID||'').toLowerCase();
    var pos= (s.Position||'').toLowerCase();
    return nm.includes(q) || id.includes(q) || pos.includes(q);
  }).slice(0, 12);

  if (!matches.length) {
    res.style.display='block';
    res.innerHTML='<div style="padding:12px 14px;color:var(--txt2);font-size:13px;">🔍 រកមិនឃើញ «'+val+'»</div>';
    return;
  }

  res.style.display='block';
  res.innerHTML = '';
  matches.forEach(function(s){
    var nm=cn(s.Name);
    var ini=(nm[0]||'?').toUpperCase();
    var div=document.createElement('div');
    div.setAttribute('data-id', s.ID);
    div.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #e2e8f0;background:#fff;';
    div.innerHTML=
      '<div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1a3c5e,#2563a8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;">'+ini+'</div>'+
      '<div style="flex:1;min-width:0;">'+
        '<div style="font-weight:600;font-size:14px;color:#1e293b;">'+nm+'</div>'+
        '<div style="font-size:11px;color:#64748b;">'+(s.Position||'')+' | '+s.ID+'</div>'+
      '</div>'+
      '<div style="font-size:10px;color:#94a3b8;">'+(s.ProjectName||'')+'</div>';
    div.addEventListener('mouseenter',function(){this.style.background='#f8faff';});
    div.addEventListener('mouseleave',function(){this.style.background='#fff';});
    div.addEventListener('click',function(){selectStaff(this.getAttribute('data-id'));});
    res.appendChild(div);
  });
}

function selectStaffEl(el) {
  selectStaff(el.getAttribute('data-id'));
}
function selectStaff(id) {
  curStaff = allStaff.filter(function(s){ return s.ID===id; })[0] || null;
  document.getElementById('searchResults').style.display='none';
  if (!curStaff) return;
  var nm = cn(curStaff.Name);
  // Show preview
  document.getElementById('sAv').textContent = nm[0]||'?';
  document.getElementById('sNm').textContent  = nm;
  document.getElementById('sSb').textContent  = (curStaff.Position||'')+' | '+(curStaff.Department||'')+' | '+curStaff.ID;
  document.getElementById('sPv').style.display = 'block';
  // Keep search input showing name
  document.getElementById('searchInput').value = nm + ' (' + curStaff.ID + ')';
  // Auto-populate project dropdown
  curProj = curStaff.ProjectName || '';
  buildProjForStaff();
  shows(['s2','s3','s4']);
}

function clearSearch() {
  curStaff = null; curProj = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('sPv').style.display = 'none';
  hides(['s2','s3','s4']);
  resetMeals();
}

function buildProjForStaff() {
  // Pre-select staff's project, allow change
  var projs = [];
  allStaff.forEach(function(s){ if(s.ProjectName && projs.indexOf(s.ProjectName)<0) projs.push(s.ProjectName); });
  projs.sort();
  var sel = document.getElementById('selProj');
  sel.innerHTML = '<option value="">-- ជ្រើសរើសគម្រោង --</option>' +
    projs.map(function(p){
      return '<option value="'+p+'"'+(p===curProj?' selected':'')+'>'+p+'</option>';
    }).join('');
}

function onProj(){
  curProj = document.getElementById('selProj').value;
}

function onStaff(){} // unused — kept for compat
function resetMeals(){
  ['m','l','e'].forEach(function(t){
    meals[t]=false; photoB64[t]=''; photoURL[t]='';
    document.getElementById('b'+t).classList.remove('on');
    document.getElementById('pa'+t).classList.remove('show');

  });

// ============================================================
// MEAL TOGGLE
// ============================================================
function togMeal(t){
  meals[t]=!meals[t];
  var b=document.getElementById('b'+t), p=document.getElementById('pa'+t);
  meals[t]?(b.classList.add('on'),p.classList.add('show')):(b.classList.remove('on'),p.classList.remove('show'));

// ============================================================
// PHOTO: Capture → Compress → Store base64 locally
// Upload to Drive happens at SUBMIT time
// ============================================================
function onPhoto(t,inp){
  var file=inp.files[0]; if(!file)return;
  setSt(t,'⏳ ដំណើរការ...','#f59e0b');
  var r=new FileReader();
  r.onload=function(e){
    var imgEl=new Image();
    imgEl.onload=function(){
      var W=600,q=0.60,w=imgEl.width,h=imgEl.height;
      if(w>W){h=Math.round(h*W/w);w=W;}
      // Extra downscale if still too large
      if(w>W){h=Math.round(h*W/w);w=W;}
      var cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(imgEl,0,0,w,h);
      var b64=cv.toDataURL('image/jpeg',q);
      // Check size
      var sizeKB = Math.round(b64.length * 0.75 / 1024);
      console.log('[Photo '+t+'] Size: '+sizeKB+'KB');
      if(sizeKB > 200) {
        // Re-compress if too large
        var cv2=document.createElement('canvas');
        cv2.width=Math.round(w*0.7); cv2.height=Math.round(h*0.7);
        cv2.getContext('2d').drawImage(imgEl,0,0,cv2.width,cv2.height);
        b64=cv2.toDataURL('image/jpeg',0.55);
        var newKB=Math.round(b64.length*0.75/1024);
        console.log('[Photo '+t+'] Re-compressed: '+newKB+'KB');
      }
      photoB64[t]=b64;
      // Show local preview
      var im=document.getElementById('img'+t);
      var ph=document.getElementById('ph'+t);
      var rm=document.getElementById('rm'+t);
      im.src=b64; im.style.display='block';
      ph.style.display='none'; rm.style.display='flex';
      setSt(t,'📷 Ready (Upload ពេល Submit)','#059669');
      toast('📷 '+t+' Ready');
    };
    imgEl.src=e.target.result;
  };
  r.readAsDataURL(file);
}

function remPhoto(t,ev){
  if(ev)ev.stopPropagation();
  photoB64[t]=''; photoURL[t]='';
  var im=document.getElementById('img'+t), ph=document.getElementById('ph'+t), rm=document.getElementById('rm'+t);
  im.src=''; im.style.display='none'; ph.style.display='flex'; rm.style.display='none';
  setSt(t,'','');
  var box=document.getElementById('pb'+t);
  var inp=box.querySelector('input[type=file]'); if(inp)inp.value='';
}

function setSt(t,msg,col){
  var el=document.getElementById('st'+t);
  el.textContent=msg; el.style.color=col;
}

// ============================================================
// SUBMIT — Send all data + photos in ONE request to Apps Script
// ============================================================
async function submitFood(){
  if(!curStaff){toast('⚠️ សូមជ្រើសបុគ្គលិក');return;}
  if(!meals.m&&!meals.l&&!meals.e){toast('⚠️ សូមជ្រើសពេលម្ហូបយ៉ាងតិច ១');return;}

  var btn=document.getElementById('btnSub');
  btn.disabled=true;
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> កំពុងបញ្ជូន...';
  showLd(true);

  var date    = new Date().toISOString().split('T')[0];
  var comment = document.getElementById('txtComment').value.trim();
  var total   = (meals.m?1:0)+(meals.l?1:0)+(meals.e?1:0);
  var totalP  = (total*UNIT).toFixed(2);
  var now     = new Date();
  var ts      = date.replace(/-/g,'')+p2(now.getHours())+p2(now.getMinutes())+p2(now.getSeconds());

  toast('📤 Uploading... (រង់ចាំ ១-២ នាទី)',30000);

  // Build payload — include base64 photos directly
  var mealNames={m:'MORNING',l:'LUNCH',e:'EVENING'};
  var photos={}, fileNames={};
  ['m','l','e'].forEach(function(t){
    if(meals[t]&&photoB64[t]){
      var key=t==='m'?'photoMorning':t==='l'?'photoLunch':'photoEvening';
      photos[key]   = photoB64[t].split(',')[1]; // base64 only
      fileNames[key]= 'FOOD_'+mealNames[t]+'_'+curStaff.ID+'_'+ts+'.jpg';
    }
  });

  var row={
    Date:       date,
    ID:         curStaff.ID,
    Name:       cn(curStaff.Name),
    Sex:        curStaff.Sex||'',
    Position:   curStaff.Position||'',
    ProjectName:curStaff.ProjectName||curProj,
    Morning:    meals.m?'✓':'',
    Lunch:      meals.l?'✓':'',
    Evening:    meals.e?'✓':'',
    Total:      String(total),
    UnitPrice:  String(UNIT),
    TotalPrice: totalP,
    PhotoMorning:'', PhotoLunch:'', PhotoEvening:'',
    Comment:    comment,
    Remark:     'QR-Scan'
  };

  var payload=JSON.stringify({
    action:'appendWithPhotos',
    sheet:'Food',
    folderId:FOLDER_ID,
    data:row, photos:photos, fileNames:fileNames
  });

  // Log payload size
  console.log('[Submit] Payload size:', Math.round(payload.length/1024)+'KB');
  try{
    var r=await fetch(SU,{method:'POST',mode:'cors',
      redirect:'follow',
      headers:{'Content-Type':'text/plain'},body:payload});
    console.log('[Submit] Response status:', r.status, r.url.slice(-30));
    var txt=await r.text();
    console.log('[Submit] Response:', txt.slice(0,200));
    var j=JSON.parse(txt);
    if(j.status==='ok'){
      // Update local preview to Drive URLs
      if(j.photoMorning){photoURL.m=j.photoMorning;if(document.getElementById('imgm'))document.getElementById('imgm').src=j.photoMorning;setSt('m','✅ Drive OK!','#059669');}
      if(j.photoLunch)  {photoURL.l=j.photoLunch;  if(document.getElementById('imgl'))document.getElementById('imgl').src=j.photoLunch;  setSt('l','✅ Drive OK!','#059669');}
      if(j.photoEvening){photoURL.e=j.photoEvening; if(document.getElementById('imge'))document.getElementById('imge').src=j.photoEvening; setSt('e','✅ Drive OK!','#059669');}
      showResult(total,totalP,date,comment);
    } else {
      throw new Error(j.msg||'Server error');
    }
  }catch(e){
    console.error('Submit error:',e.message);
    // Fallback: save text data only (no photos) via no-cors
    toast('⚠️ Photos skip — Saving text data...',3000);
    fetch(SU,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'append',sheet:'Food',data:row})});
    await sleep(1500);
    showResult(total,totalP,date,comment);
  }

  showLd(false);
  btn.disabled=false;
  btn.innerHTML='<i class="fas fa-paper-plane"></i><span>បញ្ជូនទិន្នន័យ</span>';
}

function showResult(total,totalP,date,comment){
  var pics=['m','l','e'].map(function(t){
    var u=photoURL[t]||photoB64[t];
    return u?'<img src="'+u+'" style="width:80px;height:60px;object-fit:cover;border-radius:8px;border:2px solid #bbf7d0;margin:2px;">':'';
  }).join('');
  document.getElementById('resEl').className='res ok';
  document.getElementById('resIco').textContent='🍽️';
  document.getElementById('resTit').textContent='ជោគជ័យ!';
  document.getElementById('resSub').innerHTML=
    '<strong>'+cn(curStaff.Name)+'</strong><br>'+
    (meals.m?'🌅 ព្រឹក ':'')+(meals.l?'☀️ ថ្ងៃ ':'')+(meals.e?'🌙 ល្ងាច ':'')+
    '<br><b>'+total+' ពេល | $'+totalP+'</b><br>'+date+
    (comment?'<br>💬 '+comment:'');
  document.getElementById('resPics').innerHTML=pics;
  document.getElementById('resEl').style.display='block';
  hides(['s1','s2','s3','s4']);
}


// ============================================================
// RESET
// ============================================================
function resetForm(){
  curStaff=null;curProj='';
  meals={m:false,l:false,e:false};
  photoB64={m:'',l:'',e:''};photoURL={m:'',l:'',e:''};
  ['m','l','e'].forEach(function(t){
    document.getElementById('b'+t).classList.remove('on');
    document.getElementById('pa'+t).classList.remove('show');
    remPhoto(t,null);
  });
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').style.display='none';
  document.getElementById('txtComment').value='';
  document.getElementById('sPv').style.display='none';
  document.getElementById('resEl').style.display='none';
  shows(['s1']); hides(['s2','s3','s4']);
}

// ============================================================
// HELPERS
// ============================================================
function cn(v){if(!v)return'';try{return decodeURIComponent(String(v).replace(/[+]/g,' ')).trim();}catch(e){return String(v).replace(/[+]/g,' ').trim();}}
function p2(n){return String(n).padStart(2,'0');}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}
function shows(ids){ids.forEach(function(id){var e=document.getElementById(id);if(e)e.style.display='block';});}
function hides(ids){ids.forEach(function(id){var e=document.getElementById(id);if(e)e.style.display='none';});}
function showLd(on){document.getElementById('ldEl').style.display=on?'flex':'none';}
function toast(msg,d){var e=document.getElementById('toastEl');e.textContent=msg;e.style.display='block';clearTimeout(e._t);e._t=setTimeout(function(){e.style.display='none';},d||2500);}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('[SW] Registered:', r.scope))
      .catch(e => console.warn('[SW] Failed:', e));
  });
}
// PWA Install Prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button if exists
  const btn = document.getElementById('pwaInstallBtn');
  if (btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const btn = document.getElementById('pwaInstallBtn');
  if (btn) btn.style.display = 'none';
  console.log('[PWA] App installed!');
});
function installPWA() {
  if (!deferredPrompt) {
    alert('ចុច Share → "Add to Home Screen" ដើម្បី Install (iOS)');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r => {
    console.log('[PWA] Install:', r.outcome);
    deferredPrompt = null;
  });
}
